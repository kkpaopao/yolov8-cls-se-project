# 模型相关的配置文件
MODEL:
  # 模型文件
  WEIGHT: './weights/yolov8s-cls-atten-SE/weights/best.pt'
  # 取值 'cpu'、'0'、 '1'、 '2'、 '3'等 cpu代表以cpu进行推理，0代表使用第0块显卡进行推理
  DEVICE: '0'
  # 阈值
  CONF: 0.4
  # 过滤类别
  CLASSES: None
  # 图片大小
  IMGSIZE: 300

UI:
  # 背景图片
  background: './icon/background.jpg'
  # 主图
  zhutu2: './icon/zhutu2.png'
  # 最上方的名称
  title: '基于深度学习的玉米病害检测识别系统'
  # 名称
  label_title: '基于深度学习的玉米病害检测识别系统'
  # 开始识别按钮背景颜色
  start_button_bg: "37,119,73"
  # 开始识别按钮字体颜色
  start_button_font: "255,255,255"
  # 导出数据按钮颜色
  export_button_bg: "37,119,73"
  # 导出数据按钮字体颜色
  export_button_font: "255,255,255"
  # 图片填充 RGB格式
  padvalue: [ 165,170,166 ]
  # 表格每列的宽度
  column_widths: [ 50, 220, 120, 200, 80, 80, 140 ]
  # 表格中字体的颜色 RGB格式
